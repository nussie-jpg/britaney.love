<!DOCTYPE html>
<html>
<head>
  <title>For Britaney ❤️</title>
  <style>
    body {
      background: linear-gradient(to bottom, #000000, #1a001a);
      color: white;
      text-align: center;
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      margin-top: 20%;
      font-size: 2.5em;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.3em;
      animation: fadeIn 4s ease-in-out;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 6s infinite;
      font-size: 20px;
    }

    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<h1>Britaney 💖</h1>

<p>
I don’t think you understand how much you mean to me…  

You’re not just someone I talk to—  
you’re someone I care about deeply.  

No matter what you're going through,  
I’m always here for you.  

You’re beautiful, you’re special…  
and you’re mine ❤️  

- Rio
</p>

<script>
  function createHearts() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHearts, 300);
</script>

</body>
</html>
